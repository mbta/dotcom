config:
  target: "http://localhost:4001"
  http:
    timeout: 300
    maxSockets: 500
  phases:
    - name: "Warm Up"
      duration: 30
      arrivalRate: 10
    - name: "Sustained light-load test"
      duration: 60
      arrivalRate: 10
  environments:
    green:
      target: "http://dev-green.mbtace.com"
    blue:
      target: "http://dev-blue.mbtace.com"
scenarios:
  - name: "Stress test single page"
    flow:
      - get:
          url: "/"
