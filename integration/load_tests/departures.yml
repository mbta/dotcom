config:
  target: "http://localhost:4001"
  phases:
    - name: fixedArrivals
      duration: "20m"
      arrivalRate: 1
  environments:
    green:
      target: "http://dev-green.mbtace.com"
    blue:
      target: "http://dev-blue.mbtace.com"
  engines:
    playwright:
      aggregateByName: true
      launchOptions:
        headless: true
      contextOptions:
        userAgent: "Artillery"
  payload:
    path: "schedule_finder_visits.csv"
    fields:
      - "route"
      - "direction"
      - "stop"
      - "count"
    loadAll: true
    name: sfVisits
    skipHeader: true
  processor: "departures.js"

scenarios:
  - name: "visit-departures"
    engine: "playwright"
    testFunction: "loadScenario"
